<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231a1410'/%3E%3Ctext x='50' y='70' font-size='70' text-anchor='middle' fill='%23c9a227' font-family='serif'%3E明%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1410" />
    <meta name="description" content="崇祯·宦海浮沉模拟器 - 一款基于明朝末年历史背景的沉浸式角色扮演游戏，体验朝堂博弈与个人抉择。" />
    <meta name="keywords" content="崇祯,明朝,历史游戏,角色扮演,策略,文字游戏" />
    <meta name="author" content="Chongzhen Game Studio" />
    <meta name="robots" content="index, follow" />
    <meta name="format-detection" content="telephone=no" />

    <!-- 缓存控制：减少 GitHub Pages 旧版本缓存导致的资源 404 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Open Graph / 社交分享 -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="崇祯·宦海浮沉模拟器" />
    <meta property="og:description" content="明末乱世，宦海浮沉。体验一个普通官员的仕途生涯，在朝堂风云中书写属于你的青史。" />
    <meta property="og:locale" content="zh_CN" />

    <!-- iOS 适配 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="崇祯" />

    <!-- 字体预加载 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.loli.net" crossorigin />
    <link rel="preload" as="style" href="https://fonts.loli.net/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;500;700;900&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link href="https://fonts.loli.net/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;500;700;900&display=swap" rel="stylesheet" /></noscript>

    <title>崇祯·宦海浮沉模拟器</title>

    <style>
      /* 关键渲染样式 - 避免白屏闪烁 */
      :root {
        --red: #5C3A1E; --red-light: #7A5030;
        --gold: #C5A55A; --gold-dark: #9A7B3A;
        --ink: #1A1A1A; --ink-light: #2D2D2D;
        --parchment: #F5E6C8; --parchment-dark: #E8D5A8;
        --jade: #2E8B57; --jade-dark: #1D6B3F;
        --blood: #4A2A12;
        --bg-deep: #0A0807;
        --font-heading: 'Ma Shan Zheng', 'Songti SC', 'STSong', 'SimSun', 'FangSong', serif;
        --font-body: 'Noto Serif SC', 'Songti SC', 'STSong', 'SimSun', serif;
      }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg-deep);
        color: var(--parchment);
        font-family: var(--font-body);
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* 加载占位 - 防止白屏 */
      .app-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--bg-deep);
        z-index: 9999;
      }

      .app-loading-text {
        font-size: 2rem;
        color: var(--gold);
        letter-spacing: 1rem;
        margin-bottom: 24px;
        font-family: var(--font-heading);
      }

      .app-loading-bar {
        width: 200px;
        height: 2px;
        background: rgba(197, 165, 90, 0.2);
        overflow: hidden;
        position: relative;
      }

      .app-loading-bar::after {
        content: '';
        position: absolute;
        top: 0;
        left: -50%;
        width: 50%;
        height: 100%;
        background: var(--gold);
        animation: loading-slide 1.5s ease-in-out infinite;
      }

      @keyframes loading-slide {
        0% { left: -50%; }
        100% { left: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-loading">
        <div class="app-loading-text">崇祯</div>
        <div class="app-loading-bar"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // 移除加载占位（主应用挂载时）
      window.addEventListener('app-ready', function() {
        const loader = document.querySelector('.app-loading');
        if (loader) loader.remove();
      });
    </script>
  </body>
</html>
