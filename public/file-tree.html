<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>项目目录树 · chongzhen-game</title>
<style>
  :root {
    --bg: #0d0a07;
    --panel: #161210;
    --panel2: #1f1810;
    --border: #2a2015;
    --gold: #c9a227;
    --gold-dim: #8b7540;
    --text: #d4c4a0;
    --text-dim: #6b5a3a;
    --accent: #6aaa3a;
    --hover: rgba(201, 162, 39, 0.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 320px 1fr 480px;
    grid-template-rows: auto 1fr;
    grid-template-areas: "head head head" "tree center preview";
    height: 100vh;
    overflow: hidden;
  }
  header {
    grid-area: head;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  h1 { margin: 0; font-size: 1rem; color: var(--gold); letter-spacing: 3px; }
  .header-info { color: var(--text-dim); font-size: 0.8rem; }
  .header-stats { display: flex; gap: 16px; }
  .stat { color: var(--text-dim); font-size: 0.8rem; }
  .stat b { color: var(--gold); margin-left: 4px; }
  .reload-btn {
    background: var(--panel2); border: 1px solid var(--border);
    color: var(--gold); padding: 4px 10px; border-radius: 2px;
    cursor: pointer; font-size: 0.8rem;
  }
  .reload-btn:hover { background: var(--border); }

  .search {
    grid-area: head;
    margin-left: auto;
  }
  .search input {
    background: var(--panel2); border: 1px solid var(--border);
    color: var(--text); padding: 4px 10px; border-radius: 2px;
    font-size: 0.85rem; width: 180px;
  }

  aside.tree {
    grid-area: tree;
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 8px;
    font-size: 0.85rem;
  }
  .node { padding: 2px 4px; cursor: pointer; user-select: none; }
  .node:hover { background: var(--hover); }
  .node.selected { background: rgba(201, 162, 39, 0.18); }
  .node-icon { display: inline-block; width: 16px; text-align: center; margin-right: 4px; }
  .node-name { color: var(--text); }
  .node.dir > .node-name { color: var(--gold); font-weight: 500; }
  .node-meta { color: var(--text-dim); font-size: 0.75rem; margin-left: 6px; }
  .children { padding-left: 16px; border-left: 1px dashed rgba(42, 32, 21, 0.6); margin-left: 8px; }
  .children.collapsed { display: none; }
  .twisty { display: inline-block; width: 12px; color: var(--text-dim); }

  .center {
    grid-area: center;
    overflow-y: auto;
    padding: 16px 20px;
  }
  .center-empty { color: var(--text-dim); text-align: center; padding: 80px 20px; }
  .breadcrumb {
    background: var(--panel); border: 1px solid var(--border);
    padding: 8px 14px; border-radius: 3px; margin-bottom: 16px;
    font-size: 0.85rem; color: var(--text-dim);
  }
  .breadcrumb b { color: var(--gold); }
  .info-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 3px; padding: 14px 18px; margin-bottom: 12px;
  }
  .info-card h3 { margin: 0 0 8px; color: var(--gold); font-size: 0.95rem; }
  .info-card .row { display: flex; gap: 12px; font-size: 0.85rem; padding: 3px 0; }
  .info-card .key { color: var(--text-dim); min-width: 80px; }
  .info-card .val { color: var(--text); font-family: 'Consolas', monospace; }

  .preview {
    grid-area: preview;
    background: var(--panel);
    border-left: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .preview-head {
    padding: 8px 14px; border-bottom: 1px solid var(--border);
    color: var(--gold); font-size: 0.85rem; letter-spacing: 1px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .preview-body {
    flex: 1; overflow: auto; padding: 12px 16px;
    font-family: 'Consolas', 'Courier New', monospace; font-size: 12px;
    line-height: 1.5; color: var(--text);
    white-space: pre; tab-size: 2;
  }
  .preview-empty { color: var(--text-dim); text-align: center; padding: 40px 20px; font-family: inherit; }
  .truncated-banner {
    background: rgba(201, 162, 39, 0.12);
    border: 1px solid rgba(201, 162, 39, 0.3);
    color: var(--gold);
    padding: 6px 10px; border-radius: 2px;
    font-size: 0.8rem; margin: 0 14px 8px;
  }
  .ext-stats {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px; margin-top: 8px;
  }
  .ext-pill {
    background: var(--panel2); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 2px;
    font-size: 0.8rem; display: flex; justify-content: space-between;
  }
  .ext-pill b { color: var(--gold); }
</style>
</head>
<body>

<header>
  <h1>📁 chongzhen-game · 项目目录树</h1>
  <div class="header-stats" id="headerStats">
    <span class="stat">文件 <b id="statFiles">—</b></span>
    <span class="stat">目录 <b id="statDirs">—</b></span>
    <span class="stat">总大小 <b id="statSize">—</b></span>
  </div>
  <div class="search">
    <input id="searchInput" type="text" placeholder="🔍 过滤文件名" />
  </div>
  <button class="reload-btn" onclick="loadTree()">🔄 刷新</button>
</header>

<aside class="tree" id="tree">
  <div style="text-align:center;color:var(--text-dim);padding:30px">加载中…</div>
</aside>

<section class="center" id="center">
  <div class="center-empty">👈 选个文件/目录看详情</div>
</section>

<aside class="preview">
  <div class="preview-head">
    <span id="previewTitle">文件预览</span>
    <span id="previewSize" style="color:var(--text-dim);font-size:0.75rem"></span>
  </div>
  <div id="truncatedBanner" class="truncated-banner" style="display:none">⚠ 仅显示前 200 行，文件更大</div>
  <div class="preview-body" id="previewBody">
    <div class="preview-empty">选个文件看代码</div>
  </div>
</aside>

<script>
let treeData = null;
let selectedPath = null;
let allNodes = []; // flat list of {node, element}

async function loadTree() {
  const r = await fetch('/api/file-tree', { cache: 'no-store' });
  if (!r.ok) {
    document.getElementById('tree').innerHTML = '<div style="color:#a04040;padding:20px">❌ ' + r.status + ' ' + r.statusText + '</div>';
    return;
  }
  treeData = await r.json();
  renderStats();
  renderTree();
  if (selectedPath) selectNode(selectedPath, false);
}

function renderStats() {
  const s = treeData.stats;
  document.getElementById('statFiles').textContent = s.totalFiles;
  document.getElementById('statDirs').textContent = s.totalDirs;
  document.getElementById('statSize').textContent = formatSize(s.totalSize);
}

function renderTree() {
  const root = document.getElementById('tree');
  root.innerHTML = '';
  allNodes = [];
  const ul = document.createElement('div');
  ul.appendChild(renderDir(treeData.tree, 0, true));
  root.appendChild(ul);
  applyFilter();
}

function renderDir(nodes, level, isRoot) {
  const wrap = document.createElement('div');
  if (!isRoot) wrap.className = 'children';
  for (const n of nodes) {
    const { el, childWrap } = renderNode(n, level);
    wrap.appendChild(el);
    if (childWrap) wrap.appendChild(childWrap);
  }
  return wrap;
}

function renderNode(n, level) {
  const el = document.createElement('div');
  el.className = 'node ' + n.type;
  el.dataset.path = n.path;
  el.dataset.name = n.name.toLowerCase();
  if (n.type === 'file') el.dataset.ext = n.ext;

  const twisty = document.createElement('span');
  twisty.className = 'twisty';
  twisty.textContent = n.type === 'dir' ? '▸' : '  ';
  el.appendChild(twisty);

  const icon = document.createElement('span');
  icon.className = 'node-icon';
  icon.textContent = n.type === 'dir' ? '📁' : iconFor(n.ext);
  el.appendChild(icon);

  const name = document.createElement('span');
  name.className = 'node-name';
  name.textContent = n.name;
  el.appendChild(name);

  const meta = document.createElement('span');
  meta.className = 'node-meta';
  if (n.type === 'file') meta.textContent = formatSize(n.size);
  else meta.textContent = '(' + n.childCount + ')';
  el.appendChild(meta);

  allNodes.push({ node: n, element: el });

  el.addEventListener('click', (e) => {
    e.stopPropagation();
    if (n.type === 'dir') {
      const childWrap = el.nextElementSibling;
      if (childWrap && childWrap.classList.contains('children')) {
        const collapsed = childWrap.classList.toggle('collapsed');
        twisty.textContent = collapsed ? '▸' : '▾';
      }
    } else {
      selectNode(n.path, true);
    }
  });

  let childWrap = null;
  if (n.type === 'dir' && n.children) {
    childWrap = document.createElement('div');
    childWrap.className = 'children';
    for (const c of n.children) {
      const { el: cel, childWrap: cwrap } = renderNode(c, level + 1);
      childWrap.appendChild(cel);
      if (cwrap) childWrap.appendChild(cwrap);
    }
    twisty.textContent = '▾';
  }
  return { el, childWrap };
}

function iconFor(ext) {
  const m = {
    '.tsx': '⚛', '.ts': '🔷', '.js': '🟨', '.cjs': '🟨', '.jsx': '⚛',
    '.json': '📦', '.md': '📝', '.txt': '📄', '.html': '🌐', '.css': '🎨',
    '.png': '🖼', '.jpg': '🖼', '.svg': '🖼', '.pdf': '📕', '.ps1': '💲',
    '.py': '🐍', '.gitignore': '🚫'
  };
  return m[ext] || '📄';
}

function formatSize(b) {
  if (b < 1024) return b + 'B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + 'K';
  return (b / 1024 / 1024).toFixed(2) + 'M';
}

async function selectNode(p, fetchPreview) {
  selectedPath = p;
  // 高亮
  document.querySelectorAll('.node').forEach(el => el.classList.remove('selected'));
  for (const x of allNodes) {
    if (x.node.path === p) {
      x.element.classList.add('selected');
      // 自动展开父目录
      let parent = x.element.parentElement;
      while (parent && parent.classList && parent.classList.contains('children')) {
        parent.classList.remove('collapsed');
        parent.previousElementSibling?.querySelector('.twisty') && (parent.previousElementSibling.querySelector('.twisty').textContent = '▾');
        parent = parent.parentElement;
      }
      break;
    }
  }
  // 找节点对象
  const node = findNode(treeData.tree, p);
  if (!node) return;
  renderCenter(node);
  if (node.type === 'file' && fetchPreview) {
    await loadPreview(p);
  } else {
    document.getElementById('previewBody').innerHTML = '<div class="preview-empty">目录不能预览代码</div>';
    document.getElementById('previewTitle').textContent = node.name;
    document.getElementById('previewSize').textContent = '';
    document.getElementById('truncatedBanner').style.display = 'none';
  }
}

function findNode(arr, p) {
  for (const n of arr) {
    if (n.path === p) return n;
    if (n.children) {
      const f = findNode(n.children, p);
      if (f) return f;
    }
  }
  return null;
}

function renderCenter(node) {
  const c = document.getElementById('center');
  const isDir = node.type === 'dir';
  let html = '<div class="breadcrumb">📍 ' + node.path + '</div>';
  html += '<div class="info-card"><h3>' + (isDir ? '📁' : '📄') + ' ' + node.name + '</h3>';
  html += '<div class="row"><span class="key">类型</span><span class="val">' + (isDir ? '目录' : '文件') + '</span></div>';
  html += '<div class="row"><span class="key">路径</span><span class="val">' + node.path + '</span></div>';
  if (node.type === 'file') {
    html += '<div class="row"><span class="key">大小</span><span class="val">' + formatSize(node.size) + '</span></div>';
    html += '<div class="row"><span class="key">扩展名</span><span class="val">' + (node.ext || '—') + '</span></div>';
  } else {
    html += '<div class="row"><span class="key">子文件数</span><span class="val">' + node.childCount + '</span></div>';
  }
  html += '<div class="row"><span class="key">最后修改</span><span class="val">' + new Date(node.mtime).toLocaleString() + '</span></div>';
  html += '</div>';

  if (isDir) {
    const exts = {};
    let totalSize = 0;
    function walk(arr) {
      for (const n of arr) {
        if (n.type === 'file') { exts[n.ext] = (exts[n.ext] || 0) + 1; totalSize += n.size; }
        else if (n.children) walk(n.children);
      }
    }
    walk(node.children || []);
    const entries = Object.entries(exts).sort((a, b) => b[1] - a[1]);
    if (entries.length > 0) {
      html += '<div class="info-card"><h3>📊 目录下文件类型</h3>';
      html += '<div class="ext-stats">';
      for (const [e, c] of entries) {
        html += '<div class="ext-pill"><span>' + (e || '(无)') + '</span><b>' + c + '</b></div>';
      }
      html += '</div></div>';
    }
  }
  c.innerHTML = html;
}

async function loadPreview(p) {
  document.getElementById('previewBody').textContent = '加载中…';
  document.getElementById('previewTitle').textContent = p;
  document.getElementById('truncatedBanner').style.display = 'none';
  try {
    const r = await fetch('/api/file?path=' + encodeURIComponent(p));
    if (!r.ok) {
      document.getElementById('previewBody').textContent = '❌ HTTP ' + r.status;
      return;
    }
    const data = await r.json();
    if (data.error) {
      document.getElementById('previewBody').textContent = '❌ ' + data.error;
      return;
    }
    document.getElementById('previewSize').textContent = data.lines + ' 行 · ' + formatSize(data.size);
    document.getElementById('previewBody').textContent = data.preview;
    document.getElementById('truncatedBanner').style.display = data.truncated ? 'block' : 'none';
  } catch (e) {
    document.getElementById('previewBody').textContent = '❌ ' + e.message;
  }
}

// 搜索过滤
document.getElementById('searchInput').addEventListener('input', applyFilter);
function applyFilter() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  for (const x of allNodes) {
    if (!q) { x.element.style.display = ''; continue; }
    const match = x.node.name.toLowerCase().includes(q);
    x.element.style.display = match ? '' : 'none';
  }
}

loadTree();
setInterval(loadTree, 30000); // 30s 自动刷新
</script>
</body>
</html>
